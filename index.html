<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Solo Creator Teleprompter</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#000,#1a1a1a);color:#fff;min-height:100vh;padding:1rem}.container{max-width:1400px;margin:0 auto}.header{text-align:center;margin-bottom:2rem}.header h1{color:#00d4ff;font-size:2.5rem}.header p{color:rgba(255,255,255,.7)}#scriptInput{width:100%;min-height:200px;padding:1.5rem;font-size:1.2rem;border-radius:10px;background:rgba(0,0,0,.5);color:#fff;border:2px solid #00d4ff;resize:vertical;margin-bottom:1rem}.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:2rem}.btn{background:linear-gradient(135deg,rgba(0,212,255,.2),rgba(0,153,204,.2));border:2px solid #00d4ff;color:#fff;padding:1rem;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .3s}.btn:hover{background:linear-gradient(135deg,#00d4ff,#0099cc);transform:translateY(-2px)}.btn.active{background:linear-gradient(135deg,#00d4ff,#0099cc)}.teleprompter{background:#000;border-radius:15px;padding:4rem;min-height:500px;font-size:3rem;line-height:1.6;overflow-y:auto;border:3px solid #00d4ff;box-shadow:0 0 40px rgba(0,212,255,.3)}#cameraPreview{position:fixed;bottom:20px;right:20px;width:300px;height:225px;border-radius:15px;border:3px solid #00d4ff;display:none;z-index:1000;object-fit:cover}#cameraPreview.active{display:block}.status-badge{display:inline-block;padding:.25rem .75rem;border-radius:20px;font-size:.8rem;margin-left:.5rem}.status-badge.active{background:rgba(0,255,0,.2);color:#0f0}.status-badge.inactive{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}@media (max-width:768px){.controls{grid-template-columns:1fr}.teleprompter{padding:2rem;font-size:2.5rem}#cameraPreview{width:200px;height:150px}}</style>
</head>
<body>
<video id="cameraPreview" autoplay muted playsinline></video>
<div class="container">
<div class="header">
<h1>🎬 Professional Solo Creator Teleprompter</h1>
<p>Voice-Activated • Camera Preview • Production-Ready</p>
</div>
<textarea id="scriptInput" placeholder="🎤 Voice Control: Speak to scroll
📹 Camera Preview: See yourself
⚡ Speed Controls

Start typing..."></textarea>
<div class="controls">
<button class="btn" id="voiceBtn" onclick="toggleVoice()">🎤 Voice<span class="status-badge inactive" id="voiceStatus">OFF</span></button>
<button class="btn" id="cameraBtn" onclick="toggleCamera()">📹 Camera<span class="status-badge inactive" id="cameraStatus">OFF</span></button>
<button class="btn" onclick="playScript()">▶️ Play</button>
<button class="btn" onclick="pauseScript()">⏸️ Pause</button>
<button class="btn" onclick="resetScript()">🔄 Reset</button>
<button class="btn" onclick="faster()">⚡ Faster</button>
<button class="btn" onclick="slower()">🐢 Slower</button>
</div>
<div class="teleprompter"><div id="teleprompterText">Your script appears here...</div></div>
</div>
<script>let isPlaying=!1,scrollPos=0,scrollSpeed=1,scrollInt=null;const voice={active:!1,ctx:null,analyser:null,mic:null,threshold:30,delay:500,timeout:null,stream:null};function updateDisplay(){document.getElementById("teleprompterText").textContent=document.getElementById("scriptInput").value||"Your script appears here...",localStorage.setItem("teleprompter-script",document.getElementById("scriptInput").value)}document.getElementById("scriptInput").addEventListener("input",updateDisplay),window.addEventListener("load",()=>{const e=localStorage.getItem("teleprompter-script");e&&(document.getElementById("scriptInput").value=e,updateDisplay())});async function toggleVoice(){voice.active?stopVoice():await startVoice()}async function startVoice(){try{voice.stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:!0,noiseSuppression:!0}}),voice.ctx=new(window.AudioContext||window.webkitAudioContext),voice.analyser=voice.ctx.createAnalyser(),voice.mic=voice.ctx.createMediaStreamSource(voice.stream),voice.analyser.smoothingTimeConstant=.8,voice.analyser.fftSize=1024,voice.mic.connect(voice.analyser),voice.active=!0,document.getElementById("voiceStatus").textContent="ON",document.getElementById("voiceStatus").className="status-badge active",document.getElementById("voiceBtn").classList.add("active"),monitorVoice(),alert("🎤 Voice ON! Speak to scroll")}catch(e){alert("❌ Mic required")}}function stopVoice(){voice.active=!1,voice.stream&&voice.stream.getTracks().forEach(e=>e.stop()),voice.ctx&&voice.ctx.close(),document.getElementById("voiceStatus").textContent="OFF",document.getElementById("voiceStatus").className="status-badge inactive",document.getElementById("voiceBtn").classList.remove("active"),pauseScript()}function monitorVoice(){if(!voice.active)return;const e=voice.analyser.frequencyBinCount,t=new Uint8Array(e);let a=!1;const i=()=>{if(!voice.active)return;voice.analyser.getByteFrequencyData(t);let o=0;for(let a=0;a<e;a++)o+=t[a];const c=o/e>voice.threshold,s=a;a=c,c&&!s?(clearTimeout(voice.timeout),isPlaying||playScript()):!c&&s&&(clearTimeout(voice.timeout),voice.timeout=setTimeout(()=>{!a&&isPlaying&&pauseScript()},voice.delay)),requestAnimationFrame(i)};i()}let cameraStream=null;async function toggleCamera(){const e=document.getElementById("cameraPreview");if(cameraStream)cameraStream.getTracks().forEach(e=>e.stop()),cameraStream=null,e.classList.remove("active"),document.getElementById("cameraStatus").textContent="OFF",document.getElementById("cameraStatus").className="status-badge inactive",document.getElementById("cameraBtn").classList.remove("active");else try{cameraStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}}),e.srcObject=cameraStream,e.classList.add("active"),document.getElementById("cameraStatus").textContent="ON",document.getElementById("cameraStatus").className="status-badge active",document.getElementById("cameraBtn").classList.add("active")}catch(e){alert("❌ Camera required")}}function playScript(){isPlaying||(isPlaying=!0,scrollInt=setInterval(()=>{scrollPos+=scrollSpeed,document.querySelector(".teleprompter").scrollTop=scrollPos},16))}function pauseScript(){isPlaying&&(isPlaying=!1,clearInterval(scrollInt))}function resetScript(){pauseScript(),scrollPos=0,document.querySelector(".teleprompter").scrollTop=0}function faster(){scrollSpeed=Math.min(5,scrollSpeed+.3),alert(`Speed: ${scrollSpeed.toFixed(1)}x`)}function slower(){scrollSpeed=Math.max(.2,scrollSpeed-.3),alert(`Speed: ${scrollSpeed.toFixed(1)}x`)}console.log("%c🎬 Ready!","color:#00d4ff;font-size:20px");</script>
</body>
</html>
