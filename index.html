<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#000,#1a1a1a);color:#fff;min-height:100vh;padding:1rem}.container{max-width:1400px;margin:0 auto}.header{text-align:center;margin-bottom:2rem}.header h1{color:#00d4ff;font-size:2.5rem}.header p{color:rgba(255,255,255,.7)}.user-info{position:fixed;top:20px;right:20px;background:rgba(0,0,0,.9);padding:1rem;border-radius:10px;border:2px solid #00d4ff;display:none;z-index:1000}.user-info.active{display:block}.user-info img{width:50px;height:50px;border-radius:50%;margin-right:1rem}#scriptInput{width:100%;min-height:200px;padding:1.5rem;font-size:1.2rem;border-radius:10px;background:rgba(0,0,0,.5);color:#fff;border:2px solid #00d4ff;resize:vertical;margin-bottom:1rem}.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:2rem}.btn{background:linear-gradient(135deg,rgba(0,212,255,.2),rgba(0,153,204,.2));border:2px solid #00d4ff;color:#fff;padding:1rem;border-radius:12px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .3s}.btn:hover{background:linear-gradient(135deg,#00d4ff,#0099cc);transform:translateY(-2px)}.btn.active{background:linear-gradient(135deg,#00d4ff,#0099cc)}.btn.facebook{background:linear-gradient(135deg,#1877f2,#0d5dbf);border-color:#1877f2}.teleprompter{background:#000;border-radius:15px;padding:4rem;min-height:500px;font-size:3rem;line-height:1.6;overflow-y:auto;border:3px solid #00d4ff}#cameraPreview{position:fixed;bottom:20px;right:20px;width:300px;height:225px;border-radius:15px;border:3px solid #00d4ff;display:none;z-index:1000}#cameraPreview.active{display:block}.status-badge{display:inline-block;padding:.25rem .75rem;border-radius:20px;font-size:.8rem;margin-left:.5rem}.status-badge.active{background:rgba(0,255,0,.2);color:#0f0}.status-badge.inactive{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}.modal{position:fixe <script>window.fbAsyncInit=function(){FB.init({appId:'1262678262001369',cookie:!0,xfbml:!0,version:'v18.0'}),FB.AppEvents.logPageView(),checkLoginState()},function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];d.getElementById(id)||(js=d.createElement(s),js.id=id,js.src="https://connect.facebook.net/en_US/sdk.js",fjs.parentNode.insertBefore(js,fjs))}(document,'script','facebook-jssdk');function checkLoginState(){FB.getLoginStatus(function(e){"connected"===e.status&&getUserInfo()})}function fbLogin(){typeof FB==="undefined"?alert("❌ Please refresh"):FB.login(function(e){e.authResponse?(getUserInfo(),alert("✅ Logged in!")):alert("❌ Login cancelled")},{scope:'public_profile'})}function fbLogout(){FB.logout(function(){document.getElementById("userInfo").classList.remove("active"),document.getElementById("fbLoginBtn").style.display="block",document.getElementById("fbLogoutBtn").style.display="none",alert("Logged out")})}function getUserInfo(){FB.api('/me',{fields:'name,picture'},function(e){document.getElementById("userName").textContent=e.name,document.getElementById("userPic").src=e.picture.data.url,document.getElementById("userInfo").classList.add("active"),document.getElementById("fbLoginBtn").style.display="none",document.getElementById("fbLogoutBtn").style.display="block"})}</script>

<script>let isPlaying=!1,scrollPos=0,scrollSpeed=1,scrollInt=null;const voice={active:!1,ctx:null,analyser:null,mic:null,threshold:30,delay:500,timeout:null,stream:null};const templates={youtube:"Hey [NAME]!\n\nToday: [TOPIC].\n\nSubscribe!",course:"Lesson [NUM]: [TITLE]\n\n• [POINT 1]\n• [POINT 2]",social:"[HOOK]\n\n[VALUE]\n\n[CTA]",product:"[PRODUCT]\n\nSolves: [PROBLEM]"};let mediaRecorder=null,recordedChunks=[],recordingStartTime=0,recordingInterval=null;function updateDisplay(){document.getElementById("teleprompterText").textContent=document.getElementById("scriptInput").value||"Your script...",localStorage.setItem("teleprompter-script",document.getElementById("scriptInput").value)}document.getElementById("scriptInput").addEventListener("input",updateDisplay),window.addEventListener("load",()=>{const e=localStorage.getItem("teleprompter-script");e&&(document.getElementById("scriptInput").value=e,updateDisplay())});async function toggleVoice(){voice.active?stopVoice():await startVoice()}async function startVoice(){try{voice.stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:!0,noiseSuppression:!0}}),voice.ctx=new(window.AudioContext||window.webkitAudioContext),voice.analyser=voice.ctx.createAnalyser(),voice.mic=voice.ctx.createMediaStreamSource(voice.stream),voice.analyser.smoothingTimeConstant=.8,voice.analyser.fftSize=1024,voice.mic.connect(voice.analyser),voice.active=!0,document.getElementById("voiceStatus").textContent="ON",document.getElementById("voiceStatus").className="status-badge active",document.getElementById("voiceBtn").classList.add("active"),monitorVoice(),alert("🎤 ON!")}catch(e){alert("❌ Mic required")}}function stopVoice(){voice.active=!1,voice.stream&&voice.stream.getTracks().forEach(e=>e.stop()),voice.ctx&&voice.ctx.close(),document.getElementById("voiceStatus").textContent="OFF",document.getElementById("voiceStatus").className="status-badge inactive",document.getElementById("voiceBtn").classList.remove("active"),pause
